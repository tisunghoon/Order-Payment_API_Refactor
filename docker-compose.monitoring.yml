services:
  prometheus:
    image: prom/prometheus:latest
    container_name: myfave-prometheus
    ports:
      - "9090:9090"
    command:
      - "--web.enable-remote-write-receiver"
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
    networks:
      - myfave-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: myfave-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - myfave-network
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
      - tempo

  loki:
    image: grafana/loki:latest
    container_name: myfave-loki
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - myfave-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: myfave-promtail
    volumes:
      - ./observability/promtail.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - promtail-data:/var/lib/promtail
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - myfave-network
    restart: unless-stopped
    depends_on:
      - loki
    user: root

  tempo:
    image: grafana/tempo:latest
    container_name: myfave-tempo
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/tmp/tempo
    command: -config.file=/etc/tempo.yaml
    networks:
      - myfave-network
    restart: unless-stopped

volumes:
  grafana-data:
  loki-data:
  tempo-data:
  promtail-data:

networks:
  myfave-network:
    driver: bridge
