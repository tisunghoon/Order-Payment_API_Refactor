spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/myfave
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 100
        generate_statistics: true

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: localhost
    port: 25
    username: test
    password: test

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: test-kakao-client-id
            client-secret: test-kakao-client-secret
            scope: profile_nickname, account_email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  cloud:
    aws:
      s3:
        bucket: test-bucket
      credentials:
        access-key: test-access-key
        secret-key: test-secret-key
      region:
        static: ap-northeast-2

kakao:
  redirect-uri: http://localhost:5173/oauth/kakao/callback

portone:
  api-url: https://api.portone.io
  api-secret: test-portone-api-secret
  store-id: test-portone-store-id
  channel-key:
    card: test-card-key
    kakao-pay: test-kakao-key
    naver-pay: test-naver-key
    toss-pay: test-toss-key

logging:
  level:
    org.hibernate.stat: DEBUG
