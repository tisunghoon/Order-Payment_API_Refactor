spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/myfave
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update   # DDL로 스키마 생성 후, 엔티티 추가 시 자동 반영
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

  # 이메일 발송 (JavaMailSender + @Async)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:local-dev@example.com}
    password: ${MAIL_PASSWORD:local-dev-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # 카카오 소셜 로그인
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:local-kakao-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:local-kakao-client-secret}
            scope: profile_nickname, account_email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  # AWS S3
  cloud:
    aws:
      s3:
        bucket: ${S3_BUCKET_NAME:local-bucket}
      credentials:
        access-key: ${AWS_ACCESS_KEY:local-access-key}
        secret-key: ${AWS_SECRET_KEY:local-secret-key}
      region:
        static: ap-northeast-2

springdoc:
  swagger-ui:
    path: /swagger-ui
    enabled: true

kakao:
  redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:5173/oauth/kakao/callback}
# 포트원 샌드박스 로컬 개발 설정
portone:
  api-url: https://api.portone.io
  api-secret: ${PORTONE_API_SECRET:local-portone-api-secret}
  store-id: ${PORTONE_STORE_ID:local-portone-store-id}
  channel-key:
    card: ${PORTONE_CHANNEL_KEY_CARD:local-card-key}
    kakao-pay: ${PORTONE_CHANNEL_KEY_KAKAOPAY:local-kakao-key}
    naver-pay: ${PORTONE_CHANNEL_KEY_NAVERPAY:local-naver-key}
    toss-pay: ${PORTONE_CHANNEL_KEY_TOSSPAY:local-toss-key}

tracker:
  client-id: ${TRACKER_CLIENT_ID:local-client-id}
  client-secret: ${TRACKER_CLIENT_SECRET:local-client-secret}
  api-url: https://apis.tracker.delivery/graphql
  timeout-seconds: 15

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
