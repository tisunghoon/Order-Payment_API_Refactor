global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/prometheus-alerts.yml

scrape_configs:
  - job_name: 'myfave-api'
    metrics_path: '/api/v1/actuator/prometheus'
    static_configs:
      - targets: ['app:8080']
    relabel_configs:
      - target_label: application
        replacement: myfave-api
